
<div class="row">

    <div class="col-xl-12">

        <app-card cardTitle="Services List" blockClass="table-border-style">

                <div class="col-sm-11">
                    <!--   <button (click)="goToAbout()">Go to About</button> -->
                </div>
                <div class="col-sm-1">
                    <button type="button" class="btn btn-primary" (click)="create()" ngbTooltip="Add New Service">+</button>
                    <!--    <button class="btn btn-primary" (click)="create()">Add Subject</button> -->

                </div>
            </div>
            <div class="table-responsive">
                <!--    <div *ngIf="loading" class="mb-2">Loading...</div>
                   <div *ngIf="error" class="text-danger mb-2">{{ error }}</div> -->

                <table class="table table-hover">

                            <th>Service</th>

                            <th>Features</th>

                            <th>Day Charge</th>

                        </tr>
                    </thead>
                    <tbody>
                        <!--  *ngFor="let s of items" -->
                        <tr>
                            <!--  <td>{{ s.subId }}</td>
    <td>{{ s.subName }}</td> -->

                            <td>Service 1</td>
                            <td> Category 1</td>
                            <th>Feature 1, Feature2,...</th>
                            <th>4000</th>
                            <th>1200</th>
                            <td>

                                <button class="btn btn-sm btn-outline-primary me-2">Edit</button>
                                <button class="btn btn-sm btn-outline-danger">Delete</button>
                            </td>
                        </tr>

                    </tbody>
                </table>
                <!--  <div *ngIf="!loading && (!items || items.length === 0)" class="mt-3">No subjects found.</div> -->

            </div>
        </app-card>
    </div>
